<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Soft Sculpture</title>
  <link rel="icon" type="image/png" href="/public/assets/favicon.png">
  <link rel="stylesheet" href="/src/styles/index.css">
</head>
<body class="bg-gradient-to-br from-pink-50 via-purple-50 to-blue-50">
  <!-- Navigation -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-white bg-opacity-95 backdrop-blur-sm shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-purple-400 rounded-full flex items-center justify-center text-white font-bold">S</div>
        <span class="font-bold text-lg text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-500">Soft Sculpture</span>
      </a>

      <div class="flex gap-2">
        <a href="login.html" class="px-4 py-2 text-pink-500 border-b-2 border-pink-500 transition font-medium">Login</a>
        <a href="signup.html" class="px-4 py-2 bg-gradient-to-r from-pink-400 to-purple-400 text-white rounded-lg hover:shadow-lg transition font-medium">Sign Up</a>
      </div>
    </div>
  </nav>

  <!-- Login Form -->
  <section class="min-h-screen pt-24 pb-12 px-4 flex items-center justify-center">
    <div class="w-full max-w-md">
      <div class="bg-white bg-opacity-90 rounded-2xl p-8 shadow-2xl">
        <h1 class="text-3xl font-bold text-center text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-500 mb-2">
          Welcome Back
        </h1>
        <p class="text-center text-gray-600 mb-8">Sign in to your account</p>

        <form id="loginForm" class="space-y-4">
          <div>
            <label class="block text-gray-700 font-semibold mb-2">Email</label>
            <input
              type="email"
              id="email"
              class="w-full px-4 py-2 border-2 border-gray-200 rounded-lg focus:border-pink-400 focus:outline-none transition"
              placeholder="your@email.com"
              required
            >
            <span class="text-red-500 text-sm hidden" id="emailError"></span>
          </div>

          <div>
            <label class="block text-gray-700 font-semibold mb-2">Password</label>
            <input
              type="password"
              id="password"
              class="w-full px-4 py-2 border-2 border-gray-200 rounded-lg focus:border-pink-400 focus:outline-none transition"
              placeholder="••••••••"
              required
            >
            <span class="text-red-500 text-sm hidden" id="passwordError"></span>
          </div>

          <div id="serverError" class="text-red-500 text-sm hidden p-3 bg-red-100 rounded-lg"></div>
          <div id="serverSuccess" class="text-green-600 text-sm hidden p-3 bg-green-100 rounded-lg"></div>

          <button
            type="submit"
            class="w-full px-4 py-3 bg-gradient-to-r from-pink-400 to-purple-400 text-white rounded-lg hover:shadow-lg transition font-bold disabled:opacity-50"
            id="submitBtn"
          >
            Sign In
          </button>
        </form>

        <div class="mt-6 text-center">
          <p class="text-gray-600">Don't have an account? <a href="signup.html" class="text-pink-600 hover:text-pink-700 font-semibold transition">Sign up here</a></p>
        </div>

        <div class="mt-6 p-3 bg-blue-100 rounded-lg text-sm text-blue-800">
          <p><strong>Demo Account:</strong></p>
          <p>Email: demo@example.com</p>
          <p>Password: demo123</p>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white py-8">
    <div class="max-w-7xl mx-auto px-4 text-center text-gray-400">
      <p>&copy; 2024 Soft Sculpture. All rights reserved.</p>
    </div>
  </footer>

  <script src="/src/pages/login.js" type="module"></script>
</body>
</html>
